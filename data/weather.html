<!DOCTYPE html>
<html>
    <head>
        <title>BAIOT Weather Station</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <style>
            body { font-family: Arial; text-align: center; background: #f4f4f4; }
            .card { background: white; padding: 20px; margin: 10px; border-radius: 10px; display: inline-block; width: 150px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
            .val { font-size: 1.5em; font-weight: bold; color: #2c3e50; }
        </style>
    </head>
    <body>
        <h1>Live Weather</h1>
        <div class="card"><div>Temperature</div><div class="val" id="t">--</div></div>
        <div class="card"><div>Humidity</div><div class="val" id="h">--</div></div>
        <div class="card"><div>Pressure</div><div class="val" id="p">--</div></div>
        <div class="card"><div>Wind Speed</div><div class="val" id="s">--</div></div>
        <div class="card"><div>Direction</div><div class="val" id="d">--</div></div>

        <script>
            var ws = new WebSocket('ws://' + window.location.hostname + ':81/');
            ws.onmessage = function(e) {
                var data = JSON.parse(e.data);
                document.getElementById('t').innerHTML = data.temp.toFixed(1) + " °C";
                document.getElementById('h').innerHTML = data.hum.toFixed(0) + " %";
                document.getElementById('p').innerHTML = data.press.toFixed(1) + " hPa";
                document.getElementById('s').innerHTML = data.speed.toFixed(1) + " m/s";
                document.getElementById('d').innerHTML = data.dir;
            };
        </script>
    </body>
</html>
